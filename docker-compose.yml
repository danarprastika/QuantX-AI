services:
  postgres:
    image: postgres:16-alpine
    container_name: quantx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quantx
      POSTGRES_PASSWORD: quantx
      POSTGRES_DB: quantx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quantx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantx"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: quantx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass quantx
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quantx
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "quantx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: quantx-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: quantx
      RABBITMQ_DEFAULT_PASS: quantx
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - quantx
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantx-api
    restart: unless-stopped
    command: uvicorn quantx.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - QUANTX_ENV=development
      - QUANTX_DATABASE_URL=postgresql+asyncpg://quantx:quantx@postgres:5432/quantx_db
      - QUANTX_REDIS_URL=redis://:quantx@redis:6379/0
      - QUANTX_WORKER_BROKER_URL=amqp://quantx:quantx@rabbitmq:5672//
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quantx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: quantx-bot
    restart: unless-stopped
    command: python -m bot.main
    environment:
      - QUANTX_BOT_TOKEN=${QUANTX_BOT_TOKEN}
      - QUANTX_BOT_ADMIN_IDS=${QUANTX_BOT_ADMIN_IDS}
      - QUANTX_ENV=development
      - QUANTX_REDIS_URL=redis://:quantx@redis:6379/1
    volumes:
      - ./bot/src:/app/src
    depends_on:
      - redis
    networks:
      - quantx

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: quantx-worker
    restart: unless-stopped
    command: celery -A worker.main worker --loglevel=info --concurrency=4
    environment:
      - QUANTX_ENV=development
      - QUANTX_WORKER_BROKER_URL=amqp://quantx:quantx@rabbitmq:5672//
      - QUANTX_WORKER_RESULT_BACKEND=redis://:quantx@redis:6379/2
    volumes:
      - ./worker/src:/app/src
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantx

  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: quantx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - quantx
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:10.3.0
    container_name: quantx-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=quantx
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - quantx

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

networks:
  quantx:
    driver: bridge

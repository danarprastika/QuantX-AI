# Global
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'quantx-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'quantx-worker'
    static_configs:
      - targets: ['worker:8001']

  - job_name: 'quantx-bot'
    static_configs:
      - targets: ['bot:8002']

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantx-api-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - QUANTX_ENV=production
      - QUANTX_DATABASE_URL=${QUANTX_DATABASE_URL}
      - QUANTX_REDIS_URL=${QUANTX_REDIS_URL}
      - QUANTX_WORKER_BROKER_URL=${QUANTX_WORKER_BROKER_URL}
      - QUANTX_SECRET_KEY=${QUANTX_SECRET_KEY}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quantx
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: quantx-bot-prod
    restart: always
    environment:
      - QUANTX_BOT_TOKEN=${QUANTX_BOT_TOKEN}
      - QUANTX_BOT_ADMIN_IDS=${QUANTX_BOT_ADMIN_IDS}
      - QUANTX_ENV=production
      - QUANTX_REDIS_URL=${QUANTX_REDIS_URL}
    volumes:
      - ./bot/src:/app/src
    depends_on:
      - redis
      - rabbitmq
    networks:
      - quantx

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: quantx-worker-prod
    restart: always
    environment:
      - QUANTX_ENV=production
      - QUANTX_WORKER_BROKER_URL=${QUANTX_WORKER_BROKER_URL}
      - QUANTX_WORKER_RESULT_BACKEND=${QUANTX_WORKER_RESULT_BACKEND}
    volumes:
      - ./worker/src:/app/src
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantx
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  postgres:
    image: postgres:16-alpine
    container_name: quantx-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quantx
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: quantx-redis-prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - quantx
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: quantx-rabbitmq-prod
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - quantx
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  quantx:
    driver: bridge

openapi: 3.0.3
info:
  title: QuantX Platform API
  description: Enterprise AI Platform for Quantitative Trading - Modular Monolith Backend
  version: 1.0.0
  contact:
    name: QuantX AI Enterprise Architecture Board
    email: architecture@quantx.ai

servers:
  - url: /api/v1
    description: API v1 Server

paths:
  /health:
    get:
      summary: Health check endpoint
      operationId: getHealth
      tags:
        - System
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /market-signals:
    get:
      summary: Retrieve market signals
      operationId: getMarketSignals
      tags:
        - Market Intelligence
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
          description: Filter by symbol
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Maximum items to return
        - name: cursor
          in: query
          schema:
            type: string
          description: Cursor for pagination
      responses:
        '200':
          description: List of market signals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MarketSignal'
                  nextCursor:
                    type: string
                    nullable: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /portfolios:
    get:
      summary: Retrieve portfolios
      operationId: getPortfolios
      tags:
        - Portfolio
      responses:
        '200':
          description: List of portfolios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Portfolio'

components:
  schemas:
    MarketSignal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        signalType:
          type: string
        confidence:
          type: number
          format: decimal
        classification:
          type: string
          enum: [Public, Internal, Confidential, Restricted]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid

    Portfolio:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        totalValue:
          type: number
          format: decimal
        classification:
          type: string
          enum: [Public, Internal, Confidential, Restricted]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Request validation failed
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string
            correlationId:
              type: string
              format: uuid
            timestamp:
              type: string
              format: date-time

  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
            description: Seconds until retry allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'